name: Build Node Server EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Instalar pkg globalmente
        run: npm install -g pkg

      - name: Gerar executável
        run: pkg server.js --targets node18-win-x64 --output toast-burnttoast.exe

      - name: Listar arquivos gerados
        run: dir

      - name: Fazer upload do EXE gerado
        uses: actions/upload-artifact@v4
        with:
          name: servidor-node-exe
          path: toast-burnttoast.exe
